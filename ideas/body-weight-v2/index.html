<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body Weight v2.0</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Body Weight v2.0</h1>
      <p class="subtitle">体重・摂取カロリー・活動消費カロリーを記録してグラフ表示</p>

      <section class="card">
        <h2>今日の記録を追加</h2>
        <form id="entry-form">
          <label>
            日付
            <input type="date" id="date" required />
          </label>
          <label>
            体重 (kg)
            <input type="number" id="weight" step="0.1" min="1" required />
          </label>
          <label>
            摂取カロリー (kcal)
            <input type="number" id="intake" min="0" required />
          </label>
          <label>
            活動消費カロリー (kcal)
            <input type="number" id="burn" min="0" required />
          </label>
          <button type="submit">保存 / 更新</button>
        </form>
      </section>

      <section class="card">
        <h2>グラフ</h2>
        <canvas id="chart" width="900" height="420" aria-label="記録グラフ"></canvas>
        <div class="legend">
          <span class="weight">● 体重</span>
          <span class="intake">● 摂取カロリー</span>
          <span class="burn">● 活動消費カロリー</span>
        </div>
      </section>

      <section class="card">
        <div class="table-head">
          <h2>履歴</h2>
          <button id="clear-all" type="button" class="danger">全削除</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>体重</th>
                <th>摂取</th>
                <th>消費</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
